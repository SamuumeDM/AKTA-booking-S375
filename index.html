<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKTA 使用预约登记</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <div class="tabs">
      <button class="tab active" data-tab="book" type="button">新建预约</button>
      <button class="tab" data-tab="list" type="button">预约列表</button>
      <button class="tab" data-tab="settings" type="button">设置</button>
    </div>

    <div class="hero">
      <section class="hero-card">
        <p class="eyebrow">Booking System</p>
        <h1>AKTA 使用预约登记</h1>
        <p class="subtext">用于登记、查看、编辑和导出 AKTA 使用预约。</p>
      </section>

      <section class="hero-card">
        <div class="stat">
          <span class="label">今日预约</span>
          <strong id="statToday">0</strong>
        </div>
        <div class="stat">
          <span class="label">即将到来</span>
          <strong id="statUpcoming">0</strong>
        </div>
        <div class="stat">
          <span class="label">设备</span>
          <strong>AKTA</strong>
        </div>
      </section>
    </div>

    <div id="noticeText" class="notice">
      请把上样、清洗、系统平衡和结束整理时间一起算进预约时段。
    </div>

    <section id="panel-book" class="panel active">
      <div class="card">
        <div class="card-header">
          <h2 id="formTitle">登记新的预约</h2>
          <p>提交后会自动检查时间冲突，并写入 Google Sheets。</p>
        </div>

        <form id="bookingForm" class="grid-form">
          <label>
            姓名 *
            <input id="user" type="text" placeholder="请输入姓名" required />
          </label>

          <label>
            日期 *
            <input id="date" type="date" required />
          </label>

          <label>
            用途（柱子类型） *
            <input id="purpose" type="text" placeholder="如 Superdex 75 / Superose 6" required />
          </label>

          <label>
            联系方式
            <input id="contact" type="text" placeholder="手机号 / 微信 / 分机" />
          </label>

          <label>
            开始时间 *
            <input id="start" type="time" required />
          </label>

          <label>
            结束时间 *
            <input id="end" type="time" required />
          </label>

          <label>
            整理时间（分钟）
            <input id="cleanupMinutes" type="number" min="0" step="5" />
          </label>

          <label class="span-2">
            备注
            <textarea id="notes" placeholder="如：清洗柱子、可能过夜、样品较多等"></textarea>
          </label>

          <div id="feedback" class="feedback hidden"></div>

          <div class="actions span-2">
            <button id="submitBtn" class="primary" type="submit">提交预约</button>
            <button id="resetBtn" type="button">重置</button>
          </div>
        </form>
      </div>
    </section>

    <section id="panel-list" class="panel">
      <div class="two-col">
        <aside class="sidebar">
          <div class="card">
            <div class="card-header">
              <h2>筛选</h2>
              <p>按姓名、用途或备注筛选。默认只显示当天预约，查看其他日期可点击下方月历。</p>
            </div>

            <div class="actions vertical">
              <label>
                关键词
                <input id="searchInput" type="text" placeholder="姓名 / 用途 / 备注" />
              </label>

              <label>
                日期
                <input id="filterDate" class="filter-date-display" type="text" readonly placeholder="默认显示今天" />
              </label>

              <div class="mini-calendar-card">
                <div class="mini-calendar-header">
                  <button id="calendarPrevBtn" class="mini-calendar-nav" type="button" aria-label="上一月">‹</button>
                  <div id="calendarMonthLabel" class="mini-calendar-title">2026年4月</div>
                  <button id="calendarNextBtn" class="mini-calendar-nav" type="button" aria-label="下一月">›</button>
                </div>

                <div class="mini-calendar-weekdays" aria-hidden="true">
                  <div class="mini-calendar-weekday">一</div>
                  <div class="mini-calendar-weekday">二</div>
                  <div class="mini-calendar-weekday">三</div>
                  <div class="mini-calendar-weekday">四</div>
                  <div class="mini-calendar-weekday">五</div>
                  <div class="mini-calendar-weekday">六</div>
                  <div class="mini-calendar-weekday">日</div>
                </div>

                <div id="miniCalendarGrid" class="mini-calendar-grid"></div>
                <div class="mini-calendar-tip">点日期即可按当天筛选，绿色小点表示当天有预约。</div>
              </div>

              <button id="clearFiltersBtn" type="button">清空筛选</button>
              <button id="exportBtn" type="button">导出 CSV</button>
            </div>
          </div>
        </aside>

        <main id="listContainer" class="list-stack"></main>
      </div>
    </section>

    <section id="panel-settings" class="panel">
      <div class="card">
        <div class="card-header">
          <h2>设置</h2>
          <p>这些设置仅保存在当前浏览器。</p>
        </div>

        <form id="settingsForm" class="grid-form">
          <label>
            标题
            <input id="labName" type="text" placeholder="AKTA 使用预约登记" />
          </label>

          <label>
            默认整理时间（分钟）
            <input id="defaultCleanupMinutes" type="number" min="0" step="5" />
          </label>

          <label class="span-2">
            提示语
            <textarea id="notice" placeholder="填写顶部提示语"></textarea>
          </label>

          <div class="actions span-2">
            <button class="primary" type="submit">保存设置</button>
            <button id="clearAllBtn" class="danger" type="button">清空所有预约</button>
          </div>
        </form>
      </div>
    </section>
  </div>

  <template id="bookingTemplate">
    <article class="card booking-card">
      <div class="booking-top">
        <div class="booking-info">
          <p class="project-name">标题</p>
          <p class="meta">元信息</p>
        </div>

        <div class="booking-actions">
          <button class="edit-btn" type="button">编辑</button>
          <button class="delete-btn danger" type="button">删除</button>
        </div>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
